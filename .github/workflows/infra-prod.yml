name: Infra — Prod

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/modules/**'
      - 'infra/environments/prod/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.9.0'
  TF_WORKING_DIR: infra/environments/prod

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }} — Prod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy') && 'prod' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.TF_STATE_BUCKET }}" ] || [ -z "${{ secrets.TF_LOCK_TABLE }}" ]; then
            echo "ERROR: TF_STATE_BUCKET and TF_LOCK_TABLE secrets must be set."
            echo "Run the 'Infra — Bootstrap' workflow first, then add those secrets."
            exit 1
          fi

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Bootstrap ECR (first-time only)
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -target=module.ecr -auto-approve

      - name: Push placeholder Lambda image if ECR is empty
        if: github.event.inputs.action == 'apply'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REPO="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/swiftlink-prod"
          IMAGE_COUNT=$(aws ecr describe-images \
            --repository-name swiftlink-prod \
            --region ${{ env.AWS_REGION }} \
            --query 'length(imageDetails)' \
            --output text 2>/dev/null || echo "0")
          if [ "$IMAGE_COUNT" = "0" ] || [ "$IMAGE_COUNT" = "None" ] || [ -z "$IMAGE_COUNT" ]; then
            echo "ECR is empty — pushing placeholder image"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
            docker pull --platform linux/amd64 public.ecr.aws/lambda/java:21
            docker tag public.ecr.aws/lambda/java:21 "${REPO}:latest"
            docker push "${REPO}:latest"
          else
            echo "ECR already has ${IMAGE_COUNT} image(s) — skipping placeholder push"
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve

      - name: Print outputs
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo ""
          echo "════════════════════════════════════"
          echo "  Prod infrastructure outputs"
          echo "════════════════════════════════════"
          terraform output
          echo "════════════════════════════════════"
